---
resources:
  tb:secrets:PulumiSecretsManager:
    secrets:
      secret_names:
        - stalwart.postboot.postgresql_backend
      recovery_window_in_days: 0

  tb:network:MultiCidrVpc:
    vpc:
      cidr_block: 10.1.0.0/16
      subnets:
        eu-central-1a:
          - 10.1.0.0/17
        eu-central-1b:
          - 10.1.128.0/17
      enable_internet_gateway: True
      egress_via_internet_gateway: True
      enable_dns_hostnames: True
      endpoint_interfaces:
        - secretsmanager

  tb:elasticache:ElastiCacheReplicationGroup:
    stalwart:
      description: Redis memory cache for Stalwart
      engine: redis
      engine_version: 7.1
      node_type: cachhe.t3.micro
      num_cache_nodes: 1
      automatic_failover_enabled: False # Must be false when num_cache_nodes is 1
      parameter_group_family: redis7
      parameter_group_params: {}
      port: 6379
      # Dynamic values set in code, or not at all:
      # source_cidrs: []
      # source_sgids: []
      # subnets: []

  tb:mailstrom:StalwartCluster:
    thundermail:
      # stores:
      #   postgresql: mailstrom/stage/stalwart-postgres-settings
      #   redis: mailstrom/stage/stalwart-redis-settings
      #   s3: mailstrom/stage/stalwart-s3-settings
      nodes:
        all-002:
          disable_api_termination: False
          ignore_ami_changes: True
          ignore_user_data_changes: True
          instance_type: t3.micro
          key_name: rjung-churro
          node_roles:
            - all
          services:
            - all
          storage_capacity: 20
          
      load_balancer:
        services:
          all:
            source_cidrs: ['0.0.0.0/0']
          # http:
          #   source_security_group_ids: []
          # imap:
          #   source_cidrs: ['0.0.0.0/0']
          # imaps:
          #   source_cidrs: ['0.0.0.0/0']
          # lmtp:
          #   source_cidrs: ['0.0.0.0/0']
          # managesieve:
          #   source_cidrs: ['0.0.0.0/0']
          # smtp:
          #   source_cidrs: ['0.0.0.0/0']
          # smtps:
          #   source_cidrs: ['0.0.0.0/0']
        
  tb:ec2:SshableInstance:
    rjung-jump:
      public_key: |
        ssh-rsa  rjung@churro
      # burrito: ssh-rsa 
      source_cidrs:
        - 76.155.125.135/32