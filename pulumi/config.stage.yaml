---
resources:
  tb:network:MultiCidrVpc:
    vpc:
      cidr_block: 10.1.0.0/16
      subnets:
        eu-central-1a:
          - 10.1.0.0/17
        eu-central-1b:
          - 10.1.128.0/17
      enable_internet_gateway: True
      egress_via_internet_gateway: True
      enable_dns_hostnames: True
      endpoint_interfaces:
        - ecr.api
        - ecr.dkr
        - secretsmanager

  tb:mailstrom:StalwartCluster:
    thundermail:
      nodes:
        all-001:
          disable_api_termination: True
          ignore_ami_changes: True
          ignore_user_data_changes: True
          instance_type: t2.micro
          storage_capacity: 20
          cluster_services:
            - all
          node_roles:
            - all
          key_name: mailstrom-stage-jumphost-keypair
          
      cluster_services:
        all:
          source_cidrs: ['0.0.0.0/0']
