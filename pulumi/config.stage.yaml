---
resources:
  tb:secrets:PulumiSecretsManager:
    secrets:
      secret_names:
        - stalwart.postboot.fallback_admin_password
        - stalwart.postboot.postgresql_backend
        - stalwart.postboot.tb-accounts_backend

  tb:network:MultiCidrVpc:
    vpc:
      cidr_block: 10.1.0.0/16
      subnets:
        eu-central-1a:
          - 10.1.0.0/17
        eu-central-1b:
          - 10.1.128.0/17
      enable_internet_gateway: True
      egress_via_internet_gateway: True
      enable_dns_hostnames: True
      endpoint_interfaces:
        - secretsmanager

  tb:elasticache:ElastiCacheReplicationGroup:
    stalwart:
      description: Redis memory cache for Stalwart
      engine: redis
      engine_version: 7.1
      node_type: cachhe.t3.micro
      num_cache_nodes: 1
      automatic_failover_enabled: False # Must be false when num_cache_nodes is 1
      parameter_group_family: redis7
      parameter_group_params: {}
      port: 6379
      # Dynamic values set in code, or not at all:
      # source_cidrs: []
      # source_sgids: []
      # subnets: []

  tb:ec2:SshableInstance:
    rjung:
      ssh_keypair_name: rjung-burrito
      source_cidrs:
        - 38.15.46.29/32
  # Fill out this template to build an SSH bastion
  # tb:ec2:SshableInstance:
  #   bastion:
  #     ssh_keypair_name: your-ec2-keypair
  #     source_cidrs:
  #       - your.ip.addr.ess/32

  tb:mailstrom:StalwartCluster:
    thundermail:
      stalwart_image: mdecimus/mail-server:v0.12
      # stalwart_image: stalwartlabs/mail-server:v0.11
      nodes:
        "0": # Must be a unique, stringified integer
          disable_api_termination: True
          ignore_ami_changes: True
          ignore_user_data_changes: True
          instance_type: t3.micro
          key_name: mailstrom-stage
          node_roles:
            - all
          services:
            - imap
            - imaps
            - jmap
            - lmtp
            - managesieve
            - smtp
            - smtps
            - submission
          storage_capacity: 20
        "99": # Must be a unique, stringified integer
          disable_api_termination: True
          ignore_ami_changes: True
          ignore_user_data_changes: True
          instance_type: t3.micro
          key_name: mailstrom-stage
          node_roles:
            - all
          services:
            - http
          storage_capacity: 20

      load_balancer:
        excluded_nodes: []
        services:
          imap:
            source_cidrs: ['0.0.0.0/0']
          imaps:
            source_cidrs: ['0.0.0.0/0']
          jmap:
            source_cidrs: ['0.0.0.0/0']
          lmtp:
            source_cidrs: ['0.0.0.0/0']
          managesieve:
            source_cidrs: ['0.0.0.0/0']
          smtp:
            source_cidrs: ['0.0.0.0/0']
          smtps:
            source_cidrs: ['0.0.0.0/0']
          submission:
            source_cidrs: ['0.0.0.0/0']
      jmap:
        account:
          purge:
            frequency: "0 0 *"
        email:
          auto-expunge: 30d
        event-source:
          throttle: 1s
        protocol:
          changes:
            max-history: 30d
            max-results: 5000
          email:
            max-attachment-size: 50000000
            max-size: 75000000
          get:
            max-objects: 500
          mailbox:
            max-depth: 10
            max-name-length: 255
          parse:
            max-items: 10
          query:
            max-results: 5000
          set:
            max-objects: 500
          upload:
            max-concurrent: 4
            max-size: 50000000
            quota:
              files: 1000
              size: 50000000
            ttl: 1h
        push:
          attempts:
            interval: 1m
            max: 3
          max-total: 100
          retry:
            interval: 1s
          throttle: 1ms
          timeout:
            request: 10s
            verify: 1s
        rate-limit:
          account: 1000/1m
          anonymous: 100/1m
        websocket:
          heartbeat: 1m
          throttle: 1s
          timeout: 10m

  tb:s3:S3BucketWebsite:
    autoconfig:
      bucket_name: tb-mailstrom-stage-autoconfig-site
      object_dir: static-stage
      website_config:
        error_document:
          key: 4xx.html
        index_document:
          suffix: stage-thundermail.com.xml
        routing_rules:
          - condition:
              http_error_code_returned_equals: "404"
            redirect:
              replace_key_with: "stage-thundermail.com.xml"
  
  tb:cloudfront:CloudFrontDistribution:
    autoconfig:
      # cache_policy_id: set in code
      certificate_arn: arn:aws:acm:us-east-1:768512802988:certificate/a765b321-ac88-473a-a0de-b777a3faf53e
      distribution:
        aliases:
          - autoconfig.stage-thundermail.com
        comment: mailstrom-stage autoconfig
        default_cache_behavior:
          allowed_methods:
            - GET
            - HEAD
            - OPTIONS
          cached_methods:
            - GET
            - HEAD
          compress: True
          # origins: set in code
          # target_origin_id: set in code
          viewer_protocol_policy: redirect-to-https
        enabled: True
        restrictions:
          geo_restriction:
            restriction_type: none
      forcibly_destroy_bucket: True
      logging_bucket_name: tb-mailstrom-stage-autoconfig-logs

  tb:cloudwatch:CloudWatchMonitoringGroup:
    alarms: {}
    notify_emails:
      - thunderbird-services-monitoring+mailstrom-stage@thunderbird.net
    # alarms:
    #   alarm_group_name:
    #     alarm_name:
    #       enabled: False
    #       threshold: 80
    #       other_options: etc