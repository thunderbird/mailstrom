# target number of concurrent connections when all spun up
users 5

# rate to spin-up more connections (connections added per second until reach target)
spawn-rate 1

# maximum locust test run time in seconds
run-time 60

# when run-time limit is reached tasks will be stopped; give N seconds for task to finish
stop-timeout 10

# when running in CI set to headless (i.e. don't use the locust web UI)
headless

# print perf summary to console only after tests are finished (not periodically during)
only-summary

# use our own logger not locust's
skip-log-setup

# save html report after each run
html './locust_output/locust-report.html'
